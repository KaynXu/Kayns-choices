name: Sync Stars

on:
  workflow_dispatch:
  schedule:
    - cron: '17 */12 * * *'

permissions:
  contents: write

jobs:
  sync-stars:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Sync starred repositories into Inbox
        run: python scripts/sync_stars.py --username KaynXu --readme README.md

      - name: Commit changes
        run: |
          if git diff --quiet README.md; then
            echo "No README changes to commit"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "docs: sync starred repos"
          git push